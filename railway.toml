[build]
buildCommand = "pip install -r requirements.txt && PLAYWRIGHT_BROWSERS_PATH=/app/ms-playwright playwright install-deps chromium && PLAYWRIGHT_BROWSERS_PATH=/app/ms-playwright playwright install chromium"

[deploy]
startCommand = "uvicorn backend.main:app --host 0.0.0.0 --port $PORT --workers 1"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.healthcheck]
path = "/health"
timeout = 30
