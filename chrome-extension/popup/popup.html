<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amazon Israel Free Ship Alert</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- מסך לא מחובר -->
  <div id="screen-login">
    <div class="header">
      <span class="logo">🔔</span>
      <h1>Amazon Israel Free Ship Alert</h1>
    </div>
    <p class="subtitle">התחבר לחשבון שלך</p>
    <form id="login-form">
      <input type="email" id="email" placeholder="אימייל" required autocomplete="email" />
      <input type="password" id="password" placeholder="סיסמה" required autocomplete="current-password" />
      <button type="submit" id="login-btn">התחבר</button>
    </form>
    <div class="divider"><span>או</span></div>
    <button id="google-btn" type="button" class="google-btn">
      <svg width="16" height="16" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M24 9.5c3.14 0 5.95 1.08 8.17 2.86l6.1-6.1C34.46 3.1 29.53 1 24 1 14.82 1 6.96 6.48 3.33 14.28l7.1 5.52C12.18 13.59 17.6 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.5 24.5c0-1.57-.14-3.08-.4-4.55H24v8.61h12.67c-.55 2.93-2.2 5.41-4.67 7.08l7.17 5.57C43.35 37.1 46.5 31.27 46.5 24.5z"/>
        <path fill="#FBBC05" d="M10.43 28.2A14.56 14.56 0 0 1 9.5 24c0-1.46.2-2.88.56-4.2l-7.1-5.52A23.93 23.93 0 0 0 0 24c0 3.86.93 7.5 2.58 10.72l7.85-6.52z"/>
        <path fill="#34A853" d="M24 47c5.53 0 10.18-1.83 13.57-4.97l-7.17-5.57c-1.88 1.27-4.28 2.04-6.4 2.04-6.4 0-11.82-4.09-13.57-9.8l-7.85 6.52C6.96 41.52 14.82 47 24 47z"/>
      </svg>
      כניסה עם Google
    </button>
    <p id="login-error" class="error hidden"></p>
  </div>

  <!-- מסך מחובר — בדף מוצר -->
  <div id="screen-product" class="hidden">
    <div class="header">
      <span class="logo">🔔</span>
      <h1>Amazon Israel Free Ship Alert</h1>
      <button id="logout-btn" class="logout">יציאה</button>
    </div>
    <div id="product-info">
      <p id="product-title" class="product-title"></p>
      <p id="product-price" class="product-price"></p>
    </div>
    <button id="add-btn">+ הוסף למעקב</button>
    <p id="add-result" class="result hidden"></p>
  </div>

  <!-- מסך מחובר — לא בדף מוצר -->
  <div id="screen-no-product" class="hidden">
    <div class="header">
      <span class="logo">🔔</span>
      <h1>Amazon Israel Free Ship Alert</h1>
      <button id="logout-btn-2" class="logout">יציאה</button>
    </div>
    <p class="no-product-msg">עבור לדף מוצר באמזון כדי להוסיף למעקב</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
