<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>לוח הבקרה · Amazon Israel Alert</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css?v=6">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-logo">
      <span>🛒 Amazon Israel Alert</span>
    </div>
    <div class="navbar-links">
      <a href="/settings">הגדרות</a>
      <button class="btn-logout" onclick="logout()">יציאה</button>
    </div>
  </nav>

  <div class="page">

    <div class="dashboard-header">
      <div>
        <h1>המוצרים שלי</h1>
        <div id="products-counter" class="products-counter"></div>
      </div>
      <div style="text-align:left;">
<div id="next-check-display" class="next-check-display"></div>
      </div>
    </div>

    <div id="notify-email-bar" style="display:none;"><span id="notify-email-display"></span></div>

    <!-- Add product -->
    <div class="add-product-card">
      <h2>הוסף מוצר למעקב</h2>
      <div id="add-alert" class="alert"></div>
      <div class="add-product-row">
        <input
          type="text"
          id="add-input"
          placeholder="הדבק קישור או ASIN — ניתן להוסיף מספר ASINs מופרדים בפסיק"
          dir="rtl"
        >
        <button class="btn-add" id="add-btn" onclick="addProduct()">הוסף מוצר</button>
      </div>
      <p style="font-size:0.78rem; color:var(--text-muted); margin-top:8px;">
        הבדיקה הבאה תתבצע אוטומטית · הסיסטם בודק כל 2 שעות
      </p>
    </div>

    <!-- Search + Filter bar -->
    <div id="filter-bar" class="filter-bar" style="display:none;">
      <input
        type="text"
        id="search-input"
        class="search-input"
        placeholder="חיפוש לפי שם / ASIN..."
        oninput="renderProducts()"
        dir="auto"
      >
      <button class="filter-btn active" onclick="setFilter('ALL', this)">הכל</button>
      <button class="filter-btn" onclick="setFilter('FREE', this)">✅ משלוח חינם</button>
      <button class="filter-btn" onclick="setFilter('NO_SHIP', this)">💳 משלוח בתשלום</button>
      <button class="filter-btn" onclick="setFilter('UNKNOWN', this)">⚠️ שגיאה</button>
    </div>

    <!-- Product list -->
    <div id="products-list" class="products-list"></div>

  </div>

  <script src="/static/app.js"></script>
  <script src="/static/dashboard.js"></script>
  <script>
    requireAuth();

    apiFetch("/me").then(async res => {
      if (res && res.ok) {
        const user = await res.json();
        document.getElementById("user-email").textContent = user.email;
        const bar = document.getElementById("notify-email-bar");
        const display = document.getElementById("notify-email-display");
        if (bar && display && user.notify_email) {
          display.textContent = user.notify_email;
          bar.style.display = "flex";
        }
      }
    });

    // Load next check time
    fetch("/health").then(r => r.json()).then(data => {
      if (data.next_check_at) {
        updateNextCheckDisplay(data.next_check_at);
      }
    }).catch(() => {});

    loadProducts();
  </script>
</body>
</html>
