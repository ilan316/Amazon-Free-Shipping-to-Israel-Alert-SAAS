<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>הגדרות · Amazon Israel Alert</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css?v=7">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-logo">
      <img src="/static/logo-new.png" alt="Amazon Israel Alert">
    </div>
    <div class="navbar-links">
      <a href="/dashboard">לוח הבקרה</a>
      <button class="btn-logout" onclick="logout()">יציאה</button>
    </div>
  </nav>

  <div class="page">
    <div class="dashboard-header">
      <h1>הגדרות חשבון</h1>
    </div>

    <div class="settings-card">
      <h2>פרטי התראות</h2>
      <div id="settings-alert" class="alert"></div>

      <form id="settings-form" onsubmit="saveSettings(event)">
        <div class="form-group">
          <label>אימייל כניסה</label>
          <input type="email" id="login-email" disabled style="background:var(--bg); color:var(--text-muted); cursor:default;">
        </div>
        <div class="form-group">
          <label>אימייל לקבלת התראות</label>
          <input type="email" id="notify-email" required placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label>שפת התראות</label>
          <select id="language">
            <option value="he">עברית</option>
            <option value="en">English</option>
          </select>
        </div>
        <button type="submit" class="btn-primary" id="save-btn" style="width:auto; padding:11px 28px;">
          שמור שינויים
        </button>
      </form>

      <!-- Change password -->
      <div class="danger-zone" style="border-color: var(--border); margin-top: 24px;">
        <h3 style="color: var(--text);">שינוי סיסמה</h3>
        <div id="password-alert" class="alert"></div>
        <form id="password-form" onsubmit="changePassword(event)">
          <div class="form-group">
            <label>סיסמה נוכחית</label>
            <input type="password" id="current-password" placeholder="סיסמה נוכחית" style="direction:ltr;">
          </div>
          <div class="form-group">
            <label>סיסמה חדשה</label>
            <input type="password" id="new-password" placeholder="לפחות 6 תווים" style="direction:ltr;">
          </div>
          <button type="submit" class="btn-secondary" id="password-btn" style="width:auto; padding:10px 24px;">
            שנה סיסמה
          </button>
        </form>
      </div>

      <!-- Notification history -->
      <div style="margin-top:24px;">
        <h3>היסטוריית התראות</h3>
        <div id="notifications-list" style="margin-top:12px;">
          <p style="color:var(--text-muted); font-size:0.85rem;">טוען...</p>
        </div>
      </div>

      <!-- Danger zone -->
      <div class="danger-zone">
        <h3>מחיקת חשבון</h3>
        <p>פעולה זו בלתי הפיכה — כל המוצרים וההיסטוריה יימחקו.</p>
        <button class="btn-danger" onclick="showDeleteDialog()">מחק חשבון</button>
      </div>
    </div>

  </div>

  <!-- Delete account dialog -->
  <div id="delete-dialog" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200; align-items:center; justify-content:center;">
    <div style="background:#fff; border-radius:12px; padding:28px; max-width:380px; width:90%; text-align:center;">
      <h2 style="margin-bottom:12px; font-size:1.1rem; color:var(--error);">מחיקת חשבון</h2>
      <p style="color:var(--text-muted); font-size:0.9rem; margin-bottom:16px;">הזן את הסיסמה שלך לאישור המחיקה</p>
      <div id="delete-alert" class="alert" style="text-align:right;"></div>
      <input type="password" id="delete-password" placeholder="סיסמה" style="width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:8px; font-size:0.9rem; margin-bottom:16px; direction:ltr;">
      <div style="display:flex; gap:10px; justify-content:center;">
        <button class="btn-danger" onclick="deleteAccount()">מחק לצמיתות</button>
        <button class="btn-secondary" onclick="closeDeleteDialog()">ביטול</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
  <script>
    requireAuth();

    // Load current settings
    apiFetch("/me").then(async res => {
      if (res && res.ok) {
        const user = await res.json();
        document.getElementById("login-email").value = user.email;
        document.getElementById("notify-email").value = user.notify_email;
        document.getElementById("language").value = user.language;
      }
    });

    // Load notification history
    apiFetch("/me/notifications").then(async res => {
      const el = document.getElementById("notifications-list");
      if (!res || !res.ok) { el.innerHTML = '<p style="color:var(--text-muted); font-size:0.85rem;">לא ניתן לטעון היסטוריה</p>'; return; }
      const logs = await res.json();
      if (!logs.length) { el.innerHTML = '<p style="color:var(--text-muted); font-size:0.85rem;">טרם נשלחו התראות</p>'; return; }
      el.innerHTML = logs.map(l => `
        <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); font-size:0.85rem;">
          <span style="color:var(--text);">${l.product_name}</span>
          <span style="color:var(--text-muted); white-space:nowrap; margin-right:12px;">${new Date(l.sent_at).toLocaleString("he-IL")}</span>
        </div>
      `).join("");
    });

    async function saveSettings(e) {
      e.preventDefault();
      const btn = document.getElementById("save-btn");
      const alert = document.getElementById("settings-alert");
      hideAlert(alert);
      btn.disabled = true;
      btn.textContent = "שומר...";

      const res = await apiFetch("/me/settings", {
        method: "PATCH",
        body: JSON.stringify({
          notify_email: document.getElementById("notify-email").value,
          language: document.getElementById("language").value,
        }),
      });

      btn.disabled = false;
      btn.textContent = "שמור שינויים";

      if (!res) return;
      if (res.ok) {
        showAlert(alert, "הגדרות נשמרו בהצלחה ✓", "success");
        setTimeout(() => hideAlert(alert), 3000);
      } else {
        const err = await res.json();
        showAlert(alert, err.detail || "שגיאה בשמירה");
      }
    }

    async function changePassword(e) {
      e.preventDefault();
      const alertEl = document.getElementById("password-alert");
      const btn = document.getElementById("password-btn");
      const current = document.getElementById("current-password").value;
      const newPwd = document.getElementById("new-password").value;
      if (!current || !newPwd) { showAlert(alertEl, "מלא את כל השדות"); return; }
      hideAlert(alertEl);
      btn.disabled = true; btn.textContent = "משנה...";
      const res = await apiFetch("/me/password", {
        method: "PATCH",
        body: JSON.stringify({ current_password: current, new_password: newPwd }),
      });
      btn.disabled = false; btn.textContent = "שנה סיסמה";
      if (!res) return;
      if (res.ok) {
        showAlert(alertEl, "הסיסמה שונתה בהצלחה ✓", "success");
        document.getElementById("password-form").reset();
        setTimeout(() => hideAlert(alertEl), 3000);
      } else {
        const err = await res.json();
        showAlert(alertEl, err.detail || "שגיאה בשינוי סיסמה");
      }
    }

    function showDeleteDialog() {
      document.getElementById("delete-dialog").style.display = "flex";
    }

    function closeDeleteDialog() {
      document.getElementById("delete-dialog").style.display = "none";
      document.getElementById("delete-password").value = "";
      hideAlert(document.getElementById("delete-alert"));
    }

    async function deleteAccount() {
      const password = document.getElementById("delete-password").value;
      const alert = document.getElementById("delete-alert");
      if (!password) { showAlert(alert, "הזן סיסמה"); return; }

      const res = await apiFetch("/me", {
        method: "DELETE",
        body: JSON.stringify({ password }),
      });

      if (!res) return;
      if (res.ok) {
        clearToken();
        window.location = "/";
      } else {
        const err = await res.json();
        showAlert(alert, err.detail || "שגיאה במחיקת החשבון");
      }
    }
  </script>
</body>
</html>
